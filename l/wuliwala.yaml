# Name: wuliwala.yaml
# UpdateTime: 2026/04/23-PM/6:55

port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7893

allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
external-controller: 127.0.0.1:9090

profile:
  store-selected: true
  store-fake-ip: true

unified-delay: true
tcp-concurrent: true
find-process-mode: strict

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback:
    - 223.5.5.5
    - 2400:3200::1
    - 119.29.29.29
    - 2402:4e00::
    - 1.1.1.1
    - 2606:4700:4700::1111
    - 8.8.8.8
    - 2001:4860:4860::8888
  fallback-filter:
    geoip: true
    geoip-code: CN

proxy-providers:
  花云·订阅:
    <<: &provider_base
      type: http
      interval: 1000
      health-check: &provider_hc
        enable: true
        url: http://cp.cloudflare.com/generate_204
        interval: 1000
        timeout: 1000
        lazy: true
      override: &provider_override
        skip-cert-verify: true
    path: ./profiles/proxies/flowercloud.yaml
    url: "https://api.xmancdn.net/osubscribe.php?token2=xqk33vkq-1b7aa364938y6g6vxi&sip002=1"

  蛙蛙·订阅:
    <<: *provider_base
    path: ./profiles/proxies/wawa.yaml
    url: "https://raw.githubusercontent.com/wutianyu1129/temp/main/t"

proxy-groups:
  # 场景
  - name: 全球·场景
    type: select
    proxies: [全球·策略]

  - name: 大陆·场景
    type: select
    proxies: [大陆·策略]

  - name: 浙大·场景
    type: select
    proxies: [浙大·策略]

  - name: 香港·场景
    type: select
    proxies: [香港·策略]

  - name: 台湾·场景
    type: select
    proxies: [台湾·策略]

  - name: 日本·场景
    type: select
    proxies: [日本·策略]

  - name: 韩国·场景
    type: select
    proxies: [韩国·策略]

  - name: 新国·场景
    type: select
    proxies: [新国·策略]

  - name: 美国·场景
    type: select
    proxies: [美国·策略]

  - name: 直连·场景
    type: select
    proxies: [直连·策略, DIRECT]

  - name: 拒绝·场景
    type: select
    proxies: [拒绝·策略, REJECT, REJECT-DROP]

  # 策略
  - name: 全球·策略
    type: select
    proxies: [全球·故障转移, 全球·延时优选, 全球·负载均衡, 全球·手动选择]

  - name: 大陆·策略
    type: select
    proxies: [大陆·故障转移, 大陆·延时优选, 大陆·负载均衡, 大陆·手动选择]

  - name: 浙大·策略
    type: select
    proxies: [浙大·故障转移, 浙大·延时优选, 浙大·负载均衡, 浙大·手动选择]

  - name: 香港·策略
    type: select
    proxies: [香港·故障转移, 香港·延时优选, 香港·负载均衡, 香港·手动选择]

  - name: 台湾·策略
    type: select
    proxies: [台湾·故障转移, 台湾·延时优选, 台湾·负载均衡, 台湾·手动选择]

  - name: 日本·策略
    type: select
    proxies: [日本·故障转移, 日本·延时优选, 日本·负载均衡, 日本·手动选择]

  - name: 韩国·策略
    type: select
    proxies: [韩国·故障转移, 韩国·延时优选, 韩国·负载均衡, 韩国·手动选择]

  - name: 新国·策略
    type: select
    proxies: [新国·故障转移, 新国·延时优选, 新国·负载均衡, 新国·手动选择]

  - name: 美国·策略
    type: select
    proxies: [美国·故障转移, 美国·延时优选, 美国·负载均衡, 美国·手动选择]

  - name: 直连·策略
    type: select
    proxies: [直连·故障转移, 直连·延时优选, 直连·负载均衡, 直连·手动选择]

  - name: 拒绝·策略
    type: select
    proxies: [拒绝·故障转移, 拒绝·延时优选, 拒绝·负载均衡, 拒绝·手动选择]

  # 延时优选
  - name: 全球·延时优选
    <<: &urltest_base
      type: url-test
      url: http://cp.cloudflare.com/generate_204
      interval: 1000
      timeout: 1000
      tolerance: 5
      lazy: true
      expected-status: 204
      use: &subs [花云·订阅, 蛙蛙·订阅]
    filter: &f_global '.*'
    exclude-filter: &x_global '(?i)邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|恢复|过期|已用|联系|邮箱|Traffic|工单|群|贩卖|通知|倒卖|防止|国内|校园|实验|实验性|游戏|🎮|TG|GAME|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|CN|China|zju|zju_cn'

  - name: 大陆·延时优选
    <<: *urltest_base
    filter: &f_cn '(?i)大陆|回国|\b(?:CN|China|zju(?:_cn)?)\b'
    exclude-filter: &x_cn '(?i)校园'

  - name: 浙大·延时优选
    <<: *urltest_base
    url: http://speedtest.zju.edu.cn
    expected-status: 200-399
    filter: &f_zju '(?i)浙大|\bzju(?:_cn)?\b'
    exclude-filter: &x_zju '(?i)校园'

  - name: 香港·延时优选
    <<: *urltest_base
    filter: &f_hk '(?i)🇭🇰|香港|\bHK\b|\bHong\b'
    exclude-filter: &x_oversea '(?i)回国|校园|实验|游戏|🎮|\bGAME\b'

  - name: 台湾·延时优选
    <<: *urltest_base
    filter: &f_tw '(?i)🇹🇼|台湾|\bTW\b|\bTai\b|\bTaiwan\b'
    exclude-filter: *x_oversea

  - name: 日本·延时优选
    <<: *urltest_base
    filter: &f_jp '(?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|\bJP\b|\bJapan\b'
    exclude-filter: *x_oversea

  - name: 韩国·延时优选
    <<: *urltest_base
    filter: &f_kr '(?i)🇰🇷|韩国|韓|首尔|\bKR\b|\bKorea\b'
    exclude-filter: *x_oversea

  - name: 新国·延时优选
    <<: *urltest_base
    filter: &f_sg '(?i)🇸🇬|新加坡|狮|\bSG\b|\bSingapore\b'
    exclude-filter: *x_oversea

  - name: 美国·延时优选
    <<: *urltest_base
    filter: &f_us '(?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|\bUS\b|United States'
    exclude-filter: *x_oversea

  - name: 直连·延时优选
    <<: *urltest_base
    filter: &f_direct '(?i)直连|\bAD\b'
    exclude-filter: *x_oversea

  - name: 拒绝·延时优选
    <<: *urltest_base
    filter: &f_reject '(?i)广告|\bAD\b'
    exclude-filter: *x_oversea

  # 故障转移
  - name: 全球·故障转移
    <<: &fallback_base
      type: fallback
      url: http://cp.cloudflare.com/generate_204
      interval: 1000
      timeout: 1000
      lazy: true
      max-failed-times: 5
      expected-status: 204
      use: *subs
    filter: *f_global
    exclude-filter: *x_global

  - name: 大陆·故障转移
    <<: *fallback_base
    filter: *f_cn
    exclude-filter: *x_cn

  - name: 浙大·故障转移
    <<: *fallback_base
    url: http://speedtest.zju.edu.cn
    expected-status: 200-399
    filter: *f_zju
    exclude-filter: *x_zju

  - name: 香港·故障转移
    <<: *fallback_base
    filter: *f_hk
    exclude-filter: *x_oversea

  - name: 台湾·故障转移
    <<: *fallback_base
    filter: *f_tw
    exclude-filter: *x_oversea

  - name: 日本·故障转移
    <<: *fallback_base
    filter: *f_jp
    exclude-filter: *x_oversea

  - name: 韩国·故障转移
    <<: *fallback_base
    filter: *f_kr
    exclude-filter: *x_oversea

  - name: 新国·故障转移
    <<: *fallback_base
    filter: *f_sg
    exclude-filter: *x_oversea

  - name: 美国·故障转移
    <<: *fallback_base
    filter: *f_us
    exclude-filter: *x_oversea

  - name: 直连·故障转移
    <<: *fallback_base
    filter: *f_direct
    exclude-filter: *x_oversea

  - name: 拒绝·故障转移
    <<: *fallback_base
    filter: *f_reject
    exclude-filter: *x_oversea

  # 负载均衡
  - name: 全球·负载均衡
    <<: &lb_base
      type: load-balance
      url: http://cp.cloudflare.com/generate_204
      interval: 1000
      timeout: 1000
      lazy: true
      strategy: consistent-hashing
      expected-status: 204
      use: *subs
    filter: *f_global
    exclude-filter: *x_global

  - name: 大陆·负载均衡
    <<: *lb_base
    filter: *f_cn
    exclude-filter: *x_cn

  - name: 浙大·负载均衡
    <<: *lb_base
    url: http://speedtest.zju.edu.cn
    expected-status: 200-399
    filter: *f_zju
    exclude-filter: *x_zju

  - name: 香港·负载均衡
    <<: *lb_base
    filter: *f_hk
    exclude-filter: *x_oversea

  - name: 台湾·负载均衡
    <<: *lb_base
    filter: *f_tw
    exclude-filter: *x_oversea

  - name: 日本·负载均衡
    <<: *lb_base
    filter: *f_jp
    exclude-filter: *x_oversea

  - name: 韩国·负载均衡
    <<: *lb_base
    filter: *f_kr
    exclude-filter: *x_oversea

  - name: 新国·负载均衡
    <<: *lb_base
    filter: *f_sg
    exclude-filter: *x_oversea

  - name: 美国·负载均衡
    <<: *lb_base
    filter: *f_us
    exclude-filter: *x_oversea

  - name: 直连·负载均衡
    <<: *lb_base
    filter: *f_direct
    exclude-filter: *x_oversea

  - name: 拒绝·负载均衡
    <<: *lb_base
    filter: *f_reject
    exclude-filter: *x_oversea

  # 手动选择
  - name: 全球·手动选择
    <<: &select_base
      type: select
      use: *subs
      proxies: &manual_actions [DIRECT, REJECT, REJECT-DROP]
    filter: *f_global
    exclude-filter: *x_global

  - name: 大陆·手动选择
    <<: *select_base
    filter: *f_cn
    exclude-filter: *x_cn

  - name: 浙大·手动选择
    <<: *select_base
    filter: *f_zju
    exclude-filter: *x_zju

  - name: 香港·手动选择
    <<: *select_base
    filter: *f_hk
    exclude-filter: *x_oversea

  - name: 台湾·手动选择
    <<: *select_base
    filter: *f_tw
    exclude-filter: *x_oversea

  - name: 日本·手动选择
    <<: *select_base
    filter: *f_jp
    exclude-filter: *x_oversea

  - name: 韩国·手动选择
    <<: *select_base
    filter: *f_kr
    exclude-filter: *x_oversea

  - name: 新国·手动选择
    <<: *select_base
    filter: *f_sg
    exclude-filter: *x_oversea

  - name: 美国·手动选择
    <<: *select_base
    filter: *f_us
    exclude-filter: *x_oversea

  - name: 直连·手动选择
    <<: *select_base
    filter: *f_direct
    exclude-filter: *x_oversea

  - name: 拒绝·手动选择
    <<: *select_base
    filter: *f_reject
    exclude-filter: *x_oversea

